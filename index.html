<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для тебя 🌸</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="background"></div>

<div id="petals"></div>

<div class="container">

    <!-- Конверт -->

 <div class="envelope" id="envelope">

    <div class="back"></div>

    <div class="letter" id="letter">

        <div class="card">

            <h1>🎁 Что тебе подарить?</h1>

            <p class="subtitle">
                Хочу выбрать подарок,
                который действительно тебя порадует 😊
            </p>

            <textarea
                id="gift"
                placeholder="Напиши всё, что придёт в голову ✨"></textarea>

            <button id="sendBtn">
                🌸 Отправить ответ
            </button>

            <div id="status"></div>

        </div>

    </div>

    <div class="front"></div>

    <div class="flap"></div>

</div>

                </div>

            </div>

        </div>

        <button class="openButton" id="openButton">
            ✉️ Открыть письмо
        </button>

    </div>

</div>

<div id="thanks" class="thanks">

    <div class="thanksCard">

        <div class="emoji">
            🎁
        </div>

        <h2>Спасибо! 🌸</h2>

        <p>
            Теперь у меня есть идея,
            в каком направлении искать подарок 😊
        </p>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
