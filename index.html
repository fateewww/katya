<!DOCTYPE html>
<html lang="ru"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>🎁 Что тебе подарить?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
body{margin:0;min-height:100vh;display:flex;justify-content:center;align-items:center;overflow:hidden;font-family:Poppins,sans-serif;background:linear-gradient(135deg,#ffeef7,#ffdbe9,#f7ecff);padding:24px}
#bg span{position:absolute;font-size:22px;opacity:.65;animation:f linear infinite;pointer-events:none}
#bg .pic{
  position:absolute;border-radius:50%;background-size:cover;background-position:center;
  border:2px solid rgba(255,255,255,.85);box-shadow:0 4px 10px rgba(150,90,120,.35);
  opacity:.85;animation:f linear infinite;pointer-events:none;
}
@keyframes f{from{transform:translateY(110vh) rotate(0deg)}to{transform:translateY(-15vh) rotate(18deg)}}

.wrap{position:relative;width:min(92vw,460px)}

.card{
  position:relative;z-index:2;
  padding:34px;border-radius:28px;
  background:rgba(255,255,255,.42);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,.55);
  box-shadow:0 15px 45px rgba(255,160,190,.32), inset 0 1px 0 rgba(255,255,255,.6);
  text-align:center;
}

/* фото-полароид */
.polaroid{
  position:absolute;z-index:3;top:-58px;right:-34px;
  width:110px;background:#fff;padding:8px;border-radius:6px;
  box-shadow:0 10px 20px rgba(150,90,120,.35);
  transform:rotate(9deg);
}
.polaroid img{width:100%;display:block;border-radius:2px}

h1{font:400 40px Pacifico;color:#e46ca5;margin:0}
.q{font-size:28px;font-weight:700;color:#8f5a77;margin:18px 0 8px}
p.hint{color:#8f7080;margin:0 0 14px}
textarea{width:100%;height:150px;border:none;border-radius:18px;padding:15px;background:rgba(255,255,255,.6);outline:none;font-size:16px;resize:none}
button{margin-top:16px;width:100%;padding:15px;border:none;border-radius:999px;background:linear-gradient(90deg,#ff9bc6,#f7a8ff);color:#fff;font-weight:700;font-size:17px;cursor:pointer}
button:disabled{opacity:.6;cursor:default}
#status{margin-top:14px;color:#c2558f;font-weight:600;min-height:24px}

.signature{
  position:fixed;left:0;right:0;bottom:14px;text-align:center;
  font:400 11px Poppins;letter-spacing:.12em;color:#a06a86;opacity:.35;
  text-transform:uppercase;pointer-events:none;
}
</style></head><body>

  <div class="card">
    <h1>🎀 Хеллоу 🎀</h1>
    <div class="q">🎁 Что тебе подарить?</div>
    <p class="hint">Пиши всё, о чём думаешь, но в рамках приличного! </p>
    <textarea id="gift" maxlength="3900" placeholder="Не пиши цветы, они и так входят в подарок-это база..."></textarea>
    <button id="sendBtn" onclick="sendMail()">🌸 Отправить ответ 🌸</button>
    <div id="status"></div>
  </div>

<div class="signature">Designed by fateewww</div>

<script>
const items=['🌸','✨','🎀','🫧','🌼','☁️'];
const isSmall = window.matchMedia('(max-width:480px)').matches;
const count = isSmall ? 22 : 45;
const photoSrc = document.getElementById('polaroidImg').src;
const photoEvery = 6; // каждый N-й элемент — фото вместо смайлика

for(let i=0;i<count;i++){
  const dur = (8+Math.random()*10)+'s';
  const delay = (-Math.random()*20)+'s';
  const left = Math.random()*100+'vw';

  if(i % photoEvery === 0){
    let p=document.createElement('span');
    p.className='pic';
    const size = 26 + Math.random()*18;
    p.style.width = size+'px';
    p.style.height = size+'px';
    p.style.backgroundImage = `url(${photoSrc})`;
    p.style.left = left;
    p.style.animationDuration = dur;
    p.style.animationDelay = delay;
    document.getElementById('bg').appendChild(p);
  } else {
    let s=document.createElement('span');
    s.textContent=items[Math.floor(Math.random()*items.length)];
    s.style.left=left;
    s.style.animationDuration=dur;
    s.style.animationDelay=delay;
    document.getElementById('bg').appendChild(s);
  }
}

const TOKEN="8401589515:AAG2jj5t1rJYLMDXzXVhkbGzYiEl0x4KIjo";
const CHAT_ID="669925146";

async function sendMail(){
  const t=gift.value.trim();
  const btn=document.getElementById('sendBtn');
  if(!t){status.textContent="🌸 Напиши ответ.";return;}
  btn.disabled = true;
  status.textContent="Отправляем...";
  try{
    const r=await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({chat_id:CHAT_ID,text:"🎁 Ответ на вопрос «Что тебе подарить?»\n\n"+t})
    });
    if(r.ok){status.textContent="🌸 Спасибо! Теперь у меня есть идея 😊";gift.value="";}
    else status.textContent="Не удалось отправить 😔";
  }catch(e){status.textContent="Ошибка соединения";}
  finally{ setTimeout(()=>{btn.disabled=false;},2500); }
}
</script>
